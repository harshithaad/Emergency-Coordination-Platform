<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfflineNet - Emergency Communication Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: 'Barlow', sans-serif;
        background: #0a0b0c;
        color: #d4d8dc;
        overflow: hidden;
      }

      @keyframes pulse {
        0%, 100% {
          box-shadow: 0 0 0 3px rgba(57, 211, 83, 0.08), 0 0 8px rgba(57, 211, 83, 0.3);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(57, 211, 83, 0.08), 0 0 16px rgba(57, 211, 83, 0.5);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0a0b0c;
      }

      ::-webkit-scrollbar-thumb {
        background: #1e2124;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #2e3338;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
